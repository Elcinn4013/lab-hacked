spring.application.name=simple-auth

# --- In-memory H2 database (rebuilt and re-seeded on every start) ---
spring.datasource.url=jdbc:h2:mem:hackdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate build the schema, then our seeder fills it with data
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Browse the live database at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:hackdb  user: sa  no password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
